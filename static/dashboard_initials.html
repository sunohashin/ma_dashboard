<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mitarbeiter-Dashboard (Kürzel)</title>
  <style>
    body {
      background-color: #121212;
      margin: 0;
      padding: 0;
    }
    #datetime {
      position: fixed;
      top: 10px;
      left: 10px;
      font-family: sans-serif;
      font-size: 1.2em;
      color: #fff;
      background-color: #222;
      padding: 5px 10px;
      border-radius: 4px;
      z-index: 100;
    }
    #version-switch {
      position: fixed;
      top: 10px;
      right: 10px;
      font-family: sans-serif;
      z-index: 100;
      display: flex;
      gap: 8px;
    }
    #version-switch a {
      color: #aaa;
      background-color: #222;
      padding: 5px 10px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.9em;
    }
    #version-switch a:hover {
      color: #fff;
      background-color: #333;
    }
    #dashboard {
      display: flex;
      flex-wrap: wrap;
      padding: 20px;
      margin-top: 50px;
    }
    .employee-square {
      width: 150px;
      height: 150px;
      margin: 10px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 1.8em;
      font-weight: bold;
      color: white;
      border-radius: 8px;
      background-color: #222;
      border: 6px solid gray;
      box-sizing: border-box;
      transition: background-color 0.3s, border-color 0.3s;
    }
    .employee-square.present {
      background-color: #2e7d32;
    }
    .employee-square.vacation {
      border-color: #07A2AD;
    }
    .employee-square.sick {
      border-color: #F5BA58;
    }
    .employee-square.overtime {
      border-color: #008C37;
    }
    .employee-square.parental {
      border-color: #FF9153;
    }
    .employee-square.other-leave {
      border-color: #E2E2E5;
    }
    .remote-indicator {
      width: 20px;
      height: 20px;
      background-color: #2196F3;
      border-radius: 50%;
      position: absolute;
      top: 5px;
      right: 5px;
    }
    #statistics {
      margin: 20px;
      font-family: sans-serif;
      color: #fff;
      background-color: #1a1a2e;
      padding: 15px 20px;
      border-radius: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
    }
    #statistics h3 {
      margin: 0;
      font-size: 1.1em;
      width: 100%;
    }
    .stat-item {
      background-color: #222;
      padding: 10px 16px;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 120px;
    }
    .stat-item .stat-value {
      font-size: 1.6em;
      font-weight: bold;
    }
    .stat-item .stat-percent {
      font-size: 0.85em;
      color: #aaa;
      margin-top: 2px;
    }
    .stat-item .stat-label {
      font-size: 0.8em;
      color: #ccc;
      margin-top: 4px;
    }
    .stat-item.stat-total {
      border-left: 4px solid #fff;
    }
    .stat-item.stat-present {
      border-left: 4px solid #2e7d32;
    }
    .stat-item.stat-absent {
      border-left: 4px solid #F5BA58;
    }
    .stat-item.stat-homeoffice {
      border-left: 4px solid #2196F3;
    }
    #legend {
      margin: 20px;
      font-family: sans-serif;
      color: #fff;
      background-color: #333;
      padding: 10px 15px;
      border-radius: 4px;
      max-width: 500px;
    }
    #legend h3 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.1em;
    }
    #legend ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
    }
    #legend li {
      width: 50%;
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.9em;
    }
    .legend-box {
      display: inline-block;
      width: 20px;
      height: 20px;
      margin-right: 8px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .legend-circle {
      display: inline-block;
      width: 20px;
      height: 20px;
      background-color: #2196F3;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="datetime"></div>
  <div id="version-switch"><a href="/fullnames">Zur Vollnamen-Ansicht</a><a href="/leave-report">Abwesenheitsbericht</a><a href="/sick-report">Krankheitszeiten</a></div>

  <div id="dashboard"></div>

  <div id="statistics">
    <h3>Statistik</h3>
  </div>

  <div id="legend">
    <h3>Legende</h3>
    <ul>
      <li><span class="legend-box" style="background-color: #2e7d32;"></span> Anwesend</li>
      <li><span class="legend-box" style="background-color: #222;"></span> Nicht anwesend</li>
      <li><span class="legend-box" style="border: 3px solid #07A2AD;"></span> Urlaub</li>
      <li><span class="legend-box" style="border: 3px solid #F5BA58;"></span> Krank</li>
      <li><span class="legend-box" style="border: 3px solid #008C37;"></span> Überstunden</li>
      <li><span class="legend-box" style="border: 3px solid #FF9153;"></span> Elternzeit</li>
      <li><span class="legend-box" style="border: 3px solid #E2E2E5;"></span> Sonstiges</li>
      <li><span class="legend-circle"></span> Home Office</li>
    </ul>
  </div>

  <script>
    function updateDateTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const weekdays = ['Sonntag', 'Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag'];
      const day = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      document.getElementById('datetime').textContent =
        `${hours}:${minutes} Uhr, ${weekdays[now.getDay()]} ${day}.${month}.${now.getFullYear()}`;
    }
    updateDateTime();
    setInterval(updateDateTime, 30000);

    function getTodayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    const categoryClasses = {
      vacation: 'vacation',
      sick: 'sick',
      overtime: 'overtime',
      parental: 'parental',
      other: 'other-leave'
    };

    const priorityOrder = ['sick', 'overtime', 'parental', 'vacation', 'other'];

    async function updateDashboard() {
      try {
        const todayStr = getTodayStr();

        // Alle Daten parallel laden
        const [staffRes, timeOffRes] = await Promise.all([
          fetch('/api/staff'),
          fetch(`/api/time_off?from=${todayStr}&to=${todayStr}`)
        ]);

        if (!staffRes.ok || !timeOffRes.ok) {
          console.error('Fehler beim Laden der Daten');
          return;
        }

        const staffData = (await staffRes.json()).data || [];
        const timeOffData = (await timeOffRes.json()).data || [];

        // Präsenzdaten mit ownIds laden
        const ownIds = staffData.map(s => s.ownId);
        const params = new URLSearchParams();
        ownIds.forEach(id => params.append('ownIds[]', id));

        const presenceRes = await fetch(`/api/presence?${params.toString()}`);
        const presenceData = presenceRes.ok ? (await presenceRes.json()).data || [] : [];

        // Mappings erstellen
        const presenceMap = {};
        presenceData.forEach(p => { presenceMap[p.ownId] = p.present; });

        const dashboard = document.getElementById('dashboard');
        dashboard.innerHTML = '';

        staffData.forEach(emp => {
          const records = timeOffData.filter(r => r.ownId === emp.ownId);
          let chosenCategory = null;
          let isHomeOffice = false;

          records.forEach(r => {
            if (r.isHomeOffice) {
              isHomeOffice = true;
            } else if (r.category) {
              if (!chosenCategory || priorityOrder.indexOf(r.category) < priorityOrder.indexOf(chosenCategory)) {
                chosenCategory = r.category;
              }
            }
          });

          const square = document.createElement('div');
          square.className = 'employee-square';

          // Präsenz: Hintergrundfarbe grün wenn anwesend
          if (presenceMap[emp.ownId]) {
            square.classList.add('present');
          }

          // Abwesenheitskategorie: Rahmenfarbe
          if (chosenCategory && categoryClasses[chosenCategory]) {
            square.classList.add(categoryClasses[chosenCategory]);
          }

          // Initialen anzeigen
          square.textContent = emp.initials;

          // Home-Office-Indikator
          if (isHomeOffice) {
            const indicator = document.createElement('div');
            indicator.className = 'remote-indicator';
            square.appendChild(indicator);
          }

          dashboard.appendChild(square);
        });

        // Statistik berechnen und anzeigen
        const totalCount = staffData.length;
        let presentCount = 0;
        let absentCount = 0;
        let homeOfficeCount = 0;

        staffData.forEach(emp => {
          const records = timeOffData.filter(r => r.ownId === emp.ownId);
          let hasAbsence = false;
          let hasHomeOffice = false;

          records.forEach(r => {
            if (r.isHomeOffice) {
              hasHomeOffice = true;
            } else if (r.category) {
              hasAbsence = true;
            }
          });

          if (presenceMap[emp.ownId]) presentCount++;
          if (hasAbsence) absentCount++;
          if (hasHomeOffice) homeOfficeCount++;
        });

        const pct = (count) => totalCount > 0 ? Math.round((count / totalCount) * 100) : 0;

        const statsContainer = document.getElementById('statistics');
        statsContainer.innerHTML = `
          <h3>Statistik</h3>
          <div class="stat-item stat-total">
            <span class="stat-value">${totalCount}</span>
            <span class="stat-label">Gesamt-Mitarbeiter</span>
          </div>
          <div class="stat-item stat-present">
            <span class="stat-value">${presentCount}</span>
            <span class="stat-percent">${pct(presentCount)}% der Gesamt-MA</span>
            <span class="stat-label">Anwesend</span>
          </div>
          <div class="stat-item stat-absent">
            <span class="stat-value">${absentCount}</span>
            <span class="stat-percent">${pct(absentCount)}% der Gesamt-MA</span>
            <span class="stat-label">Abwesenheiten</span>
          </div>
          <div class="stat-item stat-homeoffice">
            <span class="stat-value">${homeOfficeCount}</span>
            <span class="stat-percent">${pct(homeOfficeCount)}% der Gesamt-MA</span>
            <span class="stat-label">Home Office</span>
          </div>
        `;
      } catch (error) {
        console.error('Fehler beim Aktualisieren des Dashboards:', error);
      }
    }

    updateDashboard();
    setInterval(updateDashboard, 300000);
  </script>
</body>
</html>

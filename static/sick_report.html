<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Krankheitszeiten-Übersicht</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
    }
    h1 { font-size: 1.5em; margin: 0; }

    /* Navigation */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-links a {
      color: #aaa;
      background-color: #222;
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.85em;
      transition: all 0.2s;
    }
    .nav-links a:hover { color: #fff; background-color: #333; }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .controls label { font-size: 0.9em; color: #aaa; }
    select, input[type="text"] {
      background: #1e1e1e;
      color: #fff;
      border: 1px solid #444;
      padding: 7px 12px;
      border-radius: 4px;
      font-size: 0.9em;
      outline: none;
    }
    select:focus, input[type="text"]:focus { border-color: #07A2AD; }
    input[type="text"] { width: 220px; }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85em;
      color: #aaa;
      cursor: pointer;
      user-select: none;
    }
    .toggle-label input { accent-color: #07A2AD; cursor: pointer; }

    /* Category Tabs */
    .category-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .cat-tab {
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      background: #1e1e1e;
      color: #888;
      border: 1px solid #333;
      font-size: 0.85em;
      transition: all 0.2s;
      user-select: none;
    }
    .cat-tab:hover { color: #ccc; border-color: #555; }
    .cat-tab.active { background: #1a1a2e; color: #fff; border-color: #07A2AD; }

    /* Summary stats */
    .summary-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .summary-item {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 18px;
      font-size: 0.85em;
    }
    .summary-item .val { font-size: 1.3em; font-weight: 700; color: #F5BA58; }

    /* Employee cards */
    .cards-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 20px;
    }

    .emp-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
    }

    .emp-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: #1a1a2e;
      border-radius: 8px 8px 0 0;
      border-bottom: 2px solid #07A2AD;
    }
    .emp-name {
      font-weight: 600;
      font-size: 1.05em;
    }
    .emp-total {
      font-size: 0.9em;
      color: #F5BA58;
      font-weight: 600;
      white-space: nowrap;
    }

    .emp-body {
      padding: 10px 18px 16px;
    }

    .month-group {
      margin-bottom: 10px;
    }
    .month-group:last-child { margin-bottom: 0; }

    .month-label {
      font-size: 0.8em;
      font-weight: 600;
      color: #07A2AD;
      margin-bottom: 4px;
      padding-top: 6px;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 3px;
    }

    .period-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 4px 0 4px 14px;
      font-size: 0.88em;
      line-height: 1.5;
    }
    .period-info {
      color: #ccc;
      min-width: 0;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .period-info .cat-name { color: #e0e0e0; }
    .period-info .cat-krankheit { color: #F5BA58; }
    .period-info .cat-ohneAU { color: #E8A63E; }
    .period-info .cat-kindkrank { color: #D4922E; }
    .period-days {
      color: #aaa;
      white-space: nowrap;
      margin-left: 16px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .emp-no-sick {
      padding: 12px 18px 16px;
      color: #555;
      font-size: 0.85em;
      font-style: italic;
    }

    .loading { text-align: center; padding: 60px; color: #666; font-size: 1.1em; }
    .error-msg { color: #f44; padding: 20px; text-align: center; }

    /* Legend */
    .legend {
      margin-top: 15px;
      font-size: 0.8em;
      color: #777;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="nav-bar">
    <h1>Krankheitszeiten-Übersicht</h1>
    <div class="nav-links">
      <a href="/">Dashboard (Kürzel)</a>
      <a href="/fullnames">Dashboard (Namen)</a>
      <a href="/leave-report">Abwesenheitsbericht</a>
    </div>
  </div>

  <div class="controls">
    <label for="year-select">Jahr:</label>
    <select id="year-select"></select>
    <input type="text" id="search-input" placeholder="Mitarbeiter suchen...">
    <label class="toggle-label">
      <input type="checkbox" id="show-all-toggle">
      Alle Mitarbeiter anzeigen
    </label>
  </div>

  <div class="category-tabs" id="category-tabs"></div>

  <div class="summary-bar" id="summary-bar"></div>

  <div class="cards-container" id="cards-area">
    <div class="loading">Daten werden geladen...</div>
  </div>

  <div class="legend" id="legend"></div>

  <script>
    const MONTHS = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
                    'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];

    const SICK_CATS = ['Alle', 'Krankheit', 'Krankheit ohne AU', 'Kindkrank'];
    const CAT_COLORS = {
      'Krankheit': '#F5BA58',
      'Krankheit ohne AU': '#E8A63E',
      'Kindkrank': '#D4922E'
    };
    const CAT_CSS_CLASS = {
      'Krankheit': 'cat-krankheit',
      'Krankheit ohne AU': 'cat-ohneAU',
      'Kindkrank': 'cat-kindkrank'
    };

    let reportData = [];
    let activeCategory = 'Alle';
    let searchTerm = '';
    let showAll = false;

    const currentYear = new Date().getFullYear();

    // Year select
    const yearSelect = document.getElementById('year-select');
    for (let y = currentYear + 1; y >= currentYear - 5; y--) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      if (y === currentYear) opt.selected = true;
      yearSelect.appendChild(opt);
    }
    yearSelect.addEventListener('change', () => loadData(yearSelect.value));

    // Search
    document.getElementById('search-input').addEventListener('input', (e) => {
      searchTerm = e.target.value.toLowerCase();
      renderCards();
    });

    // Show all toggle
    document.getElementById('show-all-toggle').addEventListener('change', (e) => {
      showAll = e.target.checked;
      renderCards();
    });

    function buildCategoryTabs() {
      const container = document.getElementById('category-tabs');
      container.innerHTML = '';
      SICK_CATS.forEach(cat => {
        const tab = document.createElement('span');
        tab.className = 'cat-tab' + (activeCategory === cat ? ' active' : '');
        tab.textContent = cat;
        tab.onclick = () => {
          activeCategory = cat;
          document.querySelectorAll('.cat-tab').forEach(t =>
            t.classList.toggle('active', t.textContent === cat));
          renderCards();
        };
        container.appendChild(tab);
      });
    }

    function buildLegend() {
      const container = document.getElementById('legend');
      const items = [
        { label: 'Krankheit', color: '#F5BA58' },
        { label: 'Krankheit ohne AU', color: '#E8A63E' },
        { label: 'Kindkrank', color: '#D4922E' }
      ];
      container.innerHTML = items.map(i =>
        `<span class="legend-item"><span class="legend-swatch" style="background:${i.color};"></span>${i.label}</span>`
      ).join('');
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-');
      return `${d}.${m}.${y.slice(2)}`;
    }

    function formatDateRange(start, end) {
      if (start === end) return formatDate(start);
      const [, sm, sd] = start.split('-');
      const [ey, em, ed] = end.split('-');
      return `${sd}.${sm}.-${ed}.${em}.${ey.slice(2)}`;
    }

    function fmtDays(v) {
      const val = Number.isInteger(v) ? String(v) : v.toFixed(1);
      return `${val} ${v === 1 ? 'Tag' : 'Tage'}`;
    }

    function filterPeriods(periods) {
      if (activeCategory === 'Alle') return periods;
      return periods.filter(p => p.category === activeCategory);
    }

    function getFilteredData() {
      let data = reportData;
      if (searchTerm) {
        data = data.filter(e => e.fullName.toLowerCase().includes(searchTerm));
      }
      // Apply category filter to determine total and visibility
      data = data.map(emp => {
        const filtered = filterPeriods(emp.periods);
        const totalDays = filtered.reduce((s, p) => s + p.workingDays, 0);
        return { ...emp, filteredPeriods: filtered, filteredTotal: totalDays };
      });
      if (!showAll) {
        data = data.filter(e => e.filteredPeriods.length > 0);
      }
      return data;
    }

    function groupByMonth(periods) {
      const groups = {};
      periods.forEach(p => {
        const month = parseInt(p.startDate.split('-')[1], 10);
        if (!groups[month]) groups[month] = [];
        groups[month].push(p);
      });
      return groups;
    }

    function renderSummary(data) {
      const bar = document.getElementById('summary-bar');
      const totalEmps = data.filter(e => e.filteredPeriods.length > 0).length;
      const totalDays = data.reduce((s, e) => s + e.filteredTotal, 0);
      const totalPeriods = data.reduce((s, e) => s + e.filteredPeriods.length, 0);
      const fmtTotal = Number.isInteger(totalDays) ? String(totalDays) : totalDays.toFixed(1);
      bar.innerHTML = `
        <div class="summary-item">Mitarbeiter mit Krankheit: <span class="val">${totalEmps}</span></div>
        <div class="summary-item">Krankheitsfälle: <span class="val">${totalPeriods}</span></div>
        <div class="summary-item">Krankheitstage gesamt: <span class="val">${fmtTotal}</span></div>
      `;
    }

    function renderCards() {
      const area = document.getElementById('cards-area');
      const data = getFilteredData();

      renderSummary(data);

      if (data.length === 0) {
        area.innerHTML = '<div class="loading">Keine Daten vorhanden.</div>';
        return;
      }

      let html = '';

      data.forEach(emp => {
        const periods = emp.filteredPeriods;
        const total = emp.filteredTotal;
        const fmtTotal = Number.isInteger(total) ? String(total) : total.toFixed(1);

        html += '<div class="emp-card">';
        html += `<div class="emp-header">`;
        html += `<span class="emp-name">${escHtml(emp.fullName)}</span>`;
        html += `<span class="emp-total">Krankheitstage: ${fmtTotal}</span>`;
        html += `</div>`;

        if (periods.length === 0) {
          html += '<div class="emp-no-sick">Keine Krankheitszeiten</div>';
        } else {
          html += '<div class="emp-body">';

          const monthGroups = groupByMonth(periods);
          // Number periods per category across entire employee
          const catCounters = {};

          const sortedMonths = Object.keys(monthGroups).map(Number).sort((a, b) => a - b);
          sortedMonths.forEach(month => {
            html += `<div class="month-group">`;
            html += `<div class="month-label">${MONTHS[month - 1]}</div>`;

            monthGroups[month].forEach(p => {
              if (!catCounters[p.category]) catCounters[p.category] = 0;
              catCounters[p.category]++;
              const num = catCounters[p.category];
              const cssClass = CAT_CSS_CLASS[p.category] || 'cat-name';
              const dateRange = formatDateRange(p.startDate, p.endDate);
              const days = fmtDays(p.workingDays);

              html += `<div class="period-row">`;
              html += `<span class="period-info"><span class="${cssClass}">${escHtml(p.category)} ${num}</span>: ${dateRange}</span>`;
              html += `<span class="period-days">${days}</span>`;
              html += `</div>`;
            });

            html += `</div>`;
          });

          html += '</div>';
        }

        html += '</div>';
      });

      area.innerHTML = html;
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    async function loadData(year) {
      const area = document.getElementById('cards-area');
      area.innerHTML = '<div class="loading">Daten werden geladen...</div>';

      try {
        const res = await fetch(`/api/sick_report?year=${year}`);
        if (!res.ok) throw new Error('API-Fehler');
        const json = await res.json();
        if (json.error) throw new Error(json.error);
        reportData = json.data || [];
        buildCategoryTabs();
        buildLegend();
        renderCards();
      } catch (e) {
        area.innerHTML = `<div class="error-msg">Fehler beim Laden der Daten: ${escHtml(e.message)}</div>`;
        console.error(e);
      }
    }

    loadData(currentYear);
  </script>
</body>
</html>
